<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSH3 休憩クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14;
    --surface: #17171f;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent1: #b06aff;
    --accent2: #ff5fa0;
    --grad: linear-gradient(135deg, #b06aff, #ff5fa0);
    --text: #f0eeff;
    --sub: #8a879e;
    --correct: #4ecb8d;
    --wrong: #ff5f5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* ===== スタート画面 ===== */
  #start-screen {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }

  .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--sub);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  #start-screen h1 {
    font-size: 30px;
    font-weight: 900;
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  #start-screen p {
    color: var(--sub);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 36px;
  }

  .info-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .info-chip {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    color: var(--sub);
  }

  .info-chip span {
    color: var(--text);
    font-weight: 700;
  }

  .start-btn {
    width: 100%;
    padding: 18px;
    background: var(--grad);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .start-btn:hover { opacity: 0.88; }

  /* ===== クイズ画面 ===== */
  #quiz-screen {
    display: none;
    width: 100%;
    max-width: 560px;
  }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .quiz-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent1);
    text-transform: uppercase;
  }

  .quiz-count {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--sub);
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--grad);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .question-number {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--sub);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  .question-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.7;
    margin-bottom: 28px;
    color: var(--text);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .choice-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 400;
    line-height: 1.5;
    width: 100%;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent1);
    background: var(--surface2);
  }

  .choice-label {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--sub);
    flex-shrink: 0;
  }

  .choice-btn.correct {
    border-color: var(--correct);
    background: rgba(78, 203, 141, 0.08);
  }
  .choice-btn.correct .choice-label {
    background: var(--correct);
    color: #fff;
    border-color: var(--correct);
  }

  .choice-btn.wrong {
    border-color: var(--wrong);
    background: rgba(255, 95, 95, 0.06);
  }
  .choice-btn.wrong .choice-label {
    background: var(--wrong);
    color: #fff;
    border-color: var(--wrong);
  }

  .choice-btn:disabled { cursor: default; }

  .feedback-box {
    display: none;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 20px;
    animation: fadeUp 0.3s ease;
  }

  .feedback-box.correct-fb {
    background: rgba(78, 203, 141, 0.1);
    border-left: 3px solid var(--correct);
    color: #d0f5e8;
  }

  .feedback-box.wrong-fb {
    background: rgba(176, 106, 255, 0.1);
    border-left: 3px solid var(--accent1);
    color: #ddd8ff;
  }

  .feedback-box.show { display: block; }

  .feedback-head {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 6px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .next-btn {
    width: 100%;
    padding: 15px;
    background: var(--grad);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s;
  }
  .next-btn:hover { opacity: 0.88; }
  .next-btn.show { display: block; }

  /* ===== 結果画面 ===== */
  #result-screen {
    display: none;
    width: 100%;
    max-width: 520px;
    text-align: center;
  }

  .result-icon { font-size: 60px; margin-bottom: 16px; }

  .result-title {
    font-size: 24px;
    font-weight: 900;
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .result-score {
    font-family: 'Space Mono', monospace;
    font-size: 52px;
    font-weight: 700;
    color: var(--text);
    margin: 16px 0;
  }
  .result-score span { font-size: 22px; color: var(--sub); }

  .result-message {
    font-size: 15px;
    color: var(--sub);
    line-height: 1.8;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    text-align: left;
  }

  .result-message strong {
    color: var(--text);
    display: block;
    font-size: 16px;
    margin-bottom: 8px;
  }

  .chapter-scores {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    text-align: left;
  }

  .chapter-scores h4 {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 3px;
    color: var(--sub);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .chapter-row { margin-bottom: 14px; }

  .chapter-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 6px;
  }

  .chapter-name { color: var(--text); font-weight: 700; }

  .chapter-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .chapter-bar-fill {
    height: 100%;
    background: var(--grad);
    border-radius: 3px;
    transition: width 0.9s ease;
  }

  .action-btns { display: flex; flex-direction: column; gap: 10px; }

  .btn-secondary {
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--sub);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--accent1); color: var(--text); }

  .btn-primary {
    padding: 15px;
    background: var(--grad);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }
</style>
</head>
<body>

<!-- スタート画面 -->
<div id="start-screen">
  <p class="label">Photoshop 3 ── Break Quiz</p>
  <h1>☕ 休憩クイズ</h1>
  <p>前半のレタッチ系ツールをおさらいしよう！<br>全3問、気軽にどうぞ。</p>
  <div class="info-row">
    <div class="info-chip">問題数 <span>3問</span></div>
    <div class="info-chip">テーマ <span>レタッチ系ツール</span></div>
  </div>
  <button class="start-btn" onclick="startQuiz()">スタート →</button>
</div>

<!-- クイズ画面 -->
<div id="quiz-screen">
  <div class="quiz-header">
    <span class="quiz-tag">BREAK QUIZ</span>
    <span class="quiz-count" id="quiz-count">1 / 3</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="question-number" id="q-number">Q1</div>
  <div class="question-text" id="q-text"></div>
  <div class="choices" id="choices"></div>
  <div class="feedback-box" id="feedback-box">
    <div class="feedback-head" id="feedback-head"></div>
    <div id="feedback-body"></div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
</div>

<!-- 結果画面 -->
<div id="result-screen">
  <div class="result-icon" id="result-icon"></div>
  <div class="result-title" id="result-title"></div>
  <div class="result-score" id="result-score"></div>
  <div class="result-message" id="result-message"></div>
  <div class="chapter-scores" id="chapter-scores"></div>
  <div class="action-btns">
    <button class="btn-secondary" onclick="restart()">もう一度やる</button>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    q: "コピースタンプツールは、一言で言うと何をするツールですか？",
    choices: [
      "指定した部分をそのまま「増やす」ツール",
      "写真の気になる部分を「消す」ツール",
      "画像を「明るくする」ツール"
    ],
    correct: 0,
    chapter: "コピースタンプ",
    correctMsg: "正解！　コピースタンプは「そのまま増やす」ツールです。",
    explanation: "Altキーでコピーしたい場所を指定して、貼りたい場所でクリックするだけ。芝生や壁のテクスチャを自然に広げたいときに活躍します。"
  },
  {
    q: "今日のレタッチ系ツールに共通する大事なコツは何ですか？",
    choices: [
      "一度で仕上げるために、強めにかけるのがコツ",
      "「やりすぎない」こと。微調整が基本",
      "必ず全体に均一にかけること"
    ],
    correct: 1,
    chapter: "レタッチ共通",
    correctMsg: "正解！　「やりすぎない」がレタッチの鉄則です。",
    explanation: "覆い焼き・焼き込み・スポンジ、どのツールも強くかけすぎると不自然になります。写真は足し算ではなく微調整。「少し物足りないくらい」がちょうどいいです！"
  },
  {
    q: "スポット修復ツールで、写真の傷を消すときの操作はどれですか？",
    choices: [
      "消したい部分をAltキーで指定してからクリックする",
      "消したい部分をなぞるだけでOK",
      "消したい部分を選択してDeleteキーを押す"
    ],
    correct: 1,
    chapter: "修復系ツール",
    correctMsg: "正解！　スポット修復は「なぞるだけ」で自動修復してくれます。",
    explanation: "コピー元の指定が不要なのがスポット修復の強み。まずこれで試して、模様がある場所や広い傷は修復ブラシに切り替えるのがプロの使い方です。"
  }
];

let currentIndex = 0;
let score = 0;
let chapResults = {};
let answered = false;

function startQuiz() {
  currentIndex = 0; score = 0; chapResults = {}; answered = false;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = QUESTIONS[currentIndex];
  const total = QUESTIONS.length;

  document.getElementById('q-number').textContent = `Q${currentIndex + 1}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('quiz-count').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(currentIndex / total) * 100}%`;

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('next-btn').textContent = currentIndex === total - 1 ? '結果を見る →' : '次の問題へ →';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const labels = ['A', 'B', 'C'];
  q.choices.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${text}</span>`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[currentIndex];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  if (!chapResults[q.chapter]) chapResults[q.chapter] = { correct: 0, total: 0 };
  chapResults[q.chapter].total++;

  const fb = document.getElementById('feedback-box');
  const head = document.getElementById('feedback-head');
  const body = document.getElementById('feedback-body');

  if (idx === q.correct) {
    btns[idx].classList.add('correct');
    score++;
    chapResults[q.chapter].correct++;
    fb.className = 'feedback-box correct-fb show';
    head.textContent = '✅ ' + q.correctMsg;
    body.textContent = q.explanation;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    fb.className = 'feedback-box wrong-fb show';
    head.textContent = '💡 惜しい！　正解は「' + q.choices[q.correct] + '」です。';
    body.textContent = q.explanation;
  }

  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= QUESTIONS.length) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = QUESTIONS.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('result-score').innerHTML = `${score}<span> / ${total}</span>`;

  let icon, title, msg;
  if (pct === 100) {
    icon = '🏆'; title = '完璧！';
    msg = '全問正解！前半のツールがしっかり頭に入っています。後半のクリッピングマスク、楽しんでいきましょう！';
  } else if (pct >= 66) {
    icon = '👏'; title = 'よくできました！';
    msg = '惜しい問題もありましたが、ポイントはしっかり掴めています。解説を確認して、後半もいきましょう！';
  } else {
    icon = '💪'; title = 'もう一度確認しよう！';
    msg = '解説を読むと理解が深まります。ツールの役割の違いを整理して、後半に備えましょう！';
  }

  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-message').innerHTML = `<strong>${msg}</strong>`;

  // チャプター別スコア
  const chapEl = document.getElementById('chapter-scores');
  let html = '<h4>CHAPTER SCORE</h4>';
  QUESTIONS.forEach(q => {
    const d = chapResults[q.chapter] || { correct: 0, total: 0 };
    const p = d.total > 0 ? Math.round((d.correct / d.total) * 100) : 0;
    html += `
      <div class="chapter-row">
        <div class="chapter-info">
          <span class="chapter-name">${q.chapter}</span>
          <span>${d.correct} / ${d.total}</span>
        </div>
        <div class="chapter-bar-track">
          <div class="chapter-bar-fill" style="width:${p}%"></div>
        </div>
      </div>`;
  });
  chapEl.innerHTML = html;
}

function restart() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
}
</script>
</body>
</html>
