<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photoshop4 前半クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22223080;
    --border: #2e2e42;
    --grad: linear-gradient(135deg, #a855f7, #ec4899);
    --grad-text: linear-gradient(135deg, #c084fc, #f472b6);
    --purple: #a855f7;
    --pink: #ec4899;
    --green: #22c55e;
    --red: #ef4444;
    --text: #f0f0f8;
    --muted: #888899;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .wrapper {
    width: 100%;
    max-width: 680px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
  }

  .progress-wrap { margin-bottom: 32px; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--grad);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
  }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .q-type-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .q-type-badge.ox { color: #60a5fa; border-color: #60a5fa44; }
  .q-type-badge.mc { color: var(--purple); border-color: #a855f744; }

  .question {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 400;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--purple);
    background: #a855f712;
  }
  .choice-btn .badge {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    min-width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.18s;
  }
  .choice-btn:hover:not(:disabled) .badge { background: var(--purple); }

  .ox-choices { display: flex; gap: 16px; }
  .ox-btn {
    flex: 1;
    padding: 20px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--surface2);
    font-size: 42px;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ox-btn.maru { border-color: #22c55e44; background: #22c55e0a; color: var(--green); }
  .ox-btn.batsu { border-color: #ef444444; background: #ef44440a; color: var(--red); }
  .ox-btn.maru:hover:not(:disabled) { border-color: var(--green); background: #22c55e22; transform: scale(1.04); }
  .ox-btn.batsu:hover:not(:disabled) { border-color: var(--red); background: #ef444422; transform: scale(1.04); }

  .choice-btn.correct { border-color: var(--green); background: #22c55e14; }
  .choice-btn.correct .badge { background: var(--green); }
  .choice-btn.wrong { border-color: var(--red); background: #ef444414; }
  .choice-btn.wrong .badge { background: var(--red); }
  .choice-btn.show-correct { border-color: var(--green); background: #22c55e0a; }
  .choice-btn.show-correct .badge { background: var(--green); }

  .ox-btn.correct { border-color: var(--green); background: #22c55e14; }
  .ox-btn.wrong { border-color: var(--red); background: #ef444414; }
  .ox-btn.show-correct { border-color: var(--green); background: #22c55e0a; }

  .explanation {
    margin-top: 24px;
    padding: 18px 20px;
    border-radius: 10px;
    border-left: 3px solid var(--purple);
    background: #a855f710;
    font-size: 14px;
    line-height: 1.75;
    color: #d4d4e8;
    display: none;
  }
  .explanation.visible { display: block; }
  .explanation .result-label {
    font-weight: 900;
    font-size: 15px;
    margin-bottom: 6px;
  }
  .explanation .result-label.ok { color: var(--green); }
  .explanation .result-label.ng { color: var(--red); }

  .next-btn {
    display: none;
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: var(--grad);
    color: #fff;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.18s;
  }
  .next-btn:hover { opacity: 0.88; }
  .next-btn.visible { display: block; }

  .result-screen { display: none; text-align: center; }
  .result-screen.visible { display: block; }
  .result-screen .score-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .result-screen .score {
    font-size: 72px;
    font-weight: 900;
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }
  .result-screen .score-denom { font-size: 18px; color: var(--muted); margin-bottom: 24px; }
  .result-screen .message { font-size: 17px; font-weight: 700; margin-bottom: 32px; line-height: 1.6; }

  .score-graph {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .score-item {
    flex: 1;
    max-width: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
  }
  .score-item .q-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .score-item .icon { font-size: 28px; margin-bottom: 4px; }
  .score-item .q-text { font-size: 12px; color: var(--muted); line-height: 1.4; }

  .retry-btn {
    padding: 14px 40px;
    border-radius: 10px;
    border: 1px solid var(--purple);
    background: transparent;
    color: var(--purple);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }
  .retry-btn:hover { background: #a855f714; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="label">Photoshop 4 — 前半クイズ</div>
    <h1>休憩中に挑戦しよう！</h1>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-text">1 / 3</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="card">
    <div class="quiz-area" id="quiz-area"></div>
    <div class="result-screen" id="result-screen"></div>
  </div>
</div>

<script>
const questions = [
  {
    type: 'ox',
    question: 'Photoshopでガイドを引くと、完成した画像に補助線が表示されてしまう。',
    correct: false,
    explanation: 'ガイドは作業用の補助線なので、書き出し・印刷時には表示されません。レイアウトを整えるためにどんどん使ってOKです！今日のナビゲーションバー作成でも使いましたね。'
  },
  {
    type: 'mc',
    question: 'PC版デザインカンプを作るとき、アートボードの横幅は何pxにする？',
    choices: [
      '750px',
      '1920px',
      '1366px',
      '375px'
    ],
    correct: 2,
    explanation: '世界で最も使われているPC画面解像度が1366×768なので、このサイズを基準にします。今日の授業でも「cafeIA_pc」を1366×768pxで作りましたね！'
  },
  {
    type: 'ox',
    question: 'デザインカンプとは、色・フォント・写真・余白をすべて作り込んだ「Webサイトの完成見本」のことである。',
    correct: true,
    explanation: 'その通りです！デザインカンプはクライアントに見せてOKをもらうための完成見本。これをもとにコーダーがHTMLとCSSでコーディングを進めます。今日作ったカフェサイトのヘッダーがまさにそれですね！'
  }
];

let current = 0;
let score = 0;
let results = [];
let answered = false;

const quizArea = document.getElementById('quiz-area');
const resultScreen = document.getElementById('result-screen');
const progFill = document.getElementById('prog-fill');
const progText = document.getElementById('prog-text');
const progPct = document.getElementById('prog-pct');

function updateProgress(idx) {
  const pct = Math.round((idx / questions.length) * 100);
  progFill.style.width = pct + '%';
  progText.textContent = (idx + 1) + ' / ' + questions.length;
  progPct.textContent = pct + '%';
}

function renderQuestion(idx) {
  answered = false;
  updateProgress(idx);
  const q = questions[idx];
  const typeBadge = q.type === 'ox'
    ? '<span class="q-type-badge ox">○ × 問題</span>'
    : '<span class="q-type-badge mc">4 択</span>';

  let choicesHTML = '';
  if (q.type === 'ox') {
    choicesHTML = `
      <div class="ox-choices">
        <button class="ox-btn maru" onclick="answerOX(true)">○</button>
        <button class="ox-btn batsu" onclick="answerOX(false)">×</button>
      </div>`;
  } else {
    const labels = ['A', 'B', 'C', 'D'];
    choicesHTML = '<div class="choices">' + q.choices.map((c, i) =>
      `<button class="choice-btn" id="choice-${i}" onclick="answerMC(${i})">
        <span class="badge">${labels[i]}</span><span>${c}</span>
      </button>`
    ).join('') + '</div>';
  }

  quizArea.innerHTML = `
    <div class="q-num">Q${idx + 1}</div>
    ${typeBadge}
    <div class="question">${q.question}</div>
    ${choicesHTML}
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">
      ${idx + 1 < questions.length ? '次の問題へ →' : '結果を見る →'}
    </button>
  `;
}

function showExplanation(isCorrect) {
  const q = questions[current];
  const exp = document.getElementById('explanation');
  exp.innerHTML = `
    <div class="result-label ${isCorrect ? 'ok' : 'ng'}">${isCorrect ? '✓ 正解！' : '✗ 不正解'}</div>
    ${q.explanation}
  `;
  exp.classList.add('visible');
  document.getElementById('next-btn').classList.add('visible');
}

function answerOX(selected) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = selected === q.correct;
  if (isCorrect) score++;
  results.push(isCorrect);

  const maruBtn = document.querySelector('.ox-btn.maru');
  const batsuBtn = document.querySelector('.ox-btn.batsu');
  maruBtn.disabled = true;
  batsuBtn.disabled = true;

  if (selected === true) {
    maruBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) batsuBtn.classList.add('show-correct');
  } else {
    batsuBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) maruBtn.classList.add('show-correct');
  }
  showExplanation(isCorrect);
}

function answerMC(selected) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = selected === q.correct;
  if (isCorrect) score++;
  results.push(isCorrect);

  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === selected && isCorrect) btn.classList.add('correct');
    else if (i === selected && !isCorrect) btn.classList.add('wrong');
    else if (i === q.correct) btn.classList.add('show-correct');
  });
  showExplanation(isCorrect);
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    renderQuestion(current);
  } else {
    showResult();
  }
}

function showResult() {
  progFill.style.width = '100%';
  progText.textContent = questions.length + ' / ' + questions.length;
  progPct.textContent = '100%';

  quizArea.style.display = 'none';
  resultScreen.classList.add('visible');

  const msgs = [
    { min: 3, text: '完璧！今日の前半バッチリ理解できてます 🎉' },
    { min: 2, text: 'いい感じ！解説読んでもう一押し 👍' },
    { min: 0, text: '解説を読んで後半に備えよう！後半も一緒に頑張ります 💪' }
  ];
  const msg = msgs.find(m => score >= m.min).text;

  const graphItems = questions.map((q, i) => `
    <div class="score-item">
      <div class="q-label">Q${i + 1}</div>
      <div class="icon">${results[i] ? '✅' : '❌'}</div>
      <div class="q-text">${q.type === 'ox' ? '○×問題' : '4択'}</div>
    </div>
  `).join('');

  resultScreen.innerHTML = `
    <div class="score-label">SCORE</div>
    <div class="score">${score}</div>
    <div class="score-denom">/ ${questions.length} 問正解</div>
    <div class="message">${msg}</div>
    <div class="score-graph">${graphItems}</div>
    <button class="retry-btn" onclick="restart()">もう一度挑戦する</button>
  `;
}

function restart() {
  current = 0;
  score = 0;
  results = [];
  resultScreen.classList.remove('visible');
  resultScreen.innerHTML = '';
  quizArea.style.display = '';
  renderQuestion(0);
}

renderQuestion(0);
</script>
</body>
</html>
